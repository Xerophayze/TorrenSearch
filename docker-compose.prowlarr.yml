services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: torrensearch-prowlarr
    restart: unless-stopped
    ports:
      - "9696:9696"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Etc/UTC}
    volumes:
      - ./.data/prowlarr:/config
